<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="katex/katex.min.css">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7fbfa;
      --surface: rgba(255,255,255,0.92);
      --text: #123b4a;
      --muted: #5f767b;
      --accent: #e8b923;
      --line: #dceae8;
      --formula-bg: #fff6d8;
      --formula-border: #efd36b;
      --shadow: 0 10px 28px rgba(18,59,74,0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #07171d;
        --surface: rgba(17,35,42,0.94);
        --text: #eaf5f3;
        --muted: #afc4c8;
        --accent: #f2c21a;
        --line: #244650;
        --formula-bg: #2c2816;
        --formula-border: #6b5b18;
        --shadow: none;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.58;
    }
    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 16px 28px;
    }
    h1 {
      margin: 6px 0 14px;
      font-size: 2rem;
      line-height: 1.12;
      color: var(--text);
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 1.18rem;
      line-height: 1.25;
      color: var(--text);
    }
    p { margin: 0 0 12px; }
    ul {
      margin: 0 0 12px;
      padding-left: 20px;
    }
    li { margin: 5px 0; }
    .intro {
      color: var(--muted);
      font-size: 1.02rem;
      margin-bottom: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 22px;
      margin: 14px 0;
      padding: 18px 16px;
      box-shadow: var(--shadow);
    }
    .formula {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--formula-bg);
      border: 1px solid var(--formula-border);
      border-radius: 16px;
      margin: 14px 0;
      padding: 14px 12px;
    }
    .formula .katex-display { margin: 0; }
    .note {
      border-left: 4px solid var(--accent);
    }
    code {
      background: rgba(18,59,74,0.08);
      border-radius: 6px;
      padding: 1px 5px;
    }
    a { color: var(--text); }
  </style>
</head>
<body>
  <main>
    {{content}}
  </main>
  <script src="katex/katex.min.js"></script>
  <script src="katex/auto-render.min.js"></script>
  <script>
    renderMathInElement(document.body, {
      delimiters: [
        {left: "\\[", right: "\\]", display: true},
        {left: "\\(", right: "\\)", display: false}
      ],
      throwOnError: false,
      strict: "ignore"
    });
  </script>
</body>
</html>
